name: Sync Changelog

on:
  # Primary sync runs as a job in release.yml (GITHUB_TOKEN events don't
  # trigger cross-workflow runs, so the release:published trigger never fired).
  # Keep workflow_dispatch for manual catch-up runs.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-save tsx@4.21.0

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx script/sync-changelog.ts

      - name: Commit via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_CONTENT=$(base64 -w0 client/src/data/changelog.ts)
          for attempt in 1 2 3; do
            FILE_META=$(gh api repos/${{ github.repository }}/contents/client/src/data/changelog.ts \
              --jq '{sha: .sha, content: .content}')
            FILE_SHA=$(echo "$FILE_META" | jq -r '.sha')
            REMOTE_CONTENT=$(echo "$FILE_META" | jq -r '.content' | tr -d '\n')
            if [ "$NEW_CONTENT" = "$REMOTE_CONTENT" ]; then
              echo "No changelog changes needed"
              exit 0
            fi
            RESPONSE=$(gh api repos/${{ github.repository }}/contents/client/src/data/changelog.ts \
              -X PUT \
              -f message="chore: sync changelog from GitHub releases" \
              -f content="$NEW_CONTENT" \
              -f sha="$FILE_SHA" \
              -f branch="main" 2>&1) && { echo "Changelog committed successfully"; exit 0; }
            echo "API commit failed (attempt $attempt): $RESPONSE"
            sleep $((attempt * 2))
          done
          echo "Failed after 3 attempts" && exit 1
