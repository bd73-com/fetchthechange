name: Sync Changelog

on:
  # Primary sync runs as a job in release.yml (GITHUB_TOKEN events don't
  # trigger cross-workflow runs, so the release:published trigger never fired).
  # Keep workflow_dispatch for manual catch-up runs.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-save tsx

      - run: npx tsx script/sync-changelog.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/data/changelog.ts
          git diff --cached --quiet && exit 0
          git commit -m "chore: sync changelog from GitHub releases"
          git pull --rebase origin main
          git push origin HEAD:main
