name: Sync Changelog

on:
  # Primary sync runs as a job in release.yml (GITHUB_TOKEN events don't
  # trigger cross-workflow runs, so the release:published trigger never fired).
  # Keep workflow_dispatch for manual catch-up runs.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-save tsx@4.21.0

      - name: Generate and push changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            npx tsx script/sync-changelog.ts
            git add client/src/data/changelog.ts
            git diff --cached --quiet && echo "No changes" && exit 0
            git commit -m "chore: sync changelog from GitHub releases"
            git push origin HEAD:main && exit 0
            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 2))
          done
          echo "Failed after 3 attempts" && exit 1
