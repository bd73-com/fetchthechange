name: Sync Changelog

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tsx
        run: |
          npm install --no-save tsx@4.21.0
          echo "tsx version: $(npx tsx --version)"
          echo "node version: $(node --version)"

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::Running sync-changelog.ts"
          npx tsx script/sync-changelog.ts
          echo "::endgroup::"
          echo "Generated file size: $(wc -c < client/src/data/changelog.ts) bytes"
          echo "Generated file lines: $(wc -l < client/src/data/changelog.ts)"
          echo "Local blob SHA: $(git hash-object client/src/data/changelog.ts)"

      - name: Commit changelog update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL_SHA=$(git hash-object client/src/data/changelog.ts)
          NEW_CONTENT=$(base64 -w0 client/src/data/changelog.ts)

          # Fetch current file SHA from GitHub
          FILE_SHA=""
          for attempt in 1 2 3; do
            FILE_SHA=$(gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts" \
              --jq '.sha' 2>/dev/null) && [ -n "$FILE_SHA" ] && [ "$FILE_SHA" != "null" ] && break
            echo "Failed to fetch file SHA (attempt $attempt)"
            FILE_SHA=""
            sleep $((attempt * 2))
          done
          if [ -z "$FILE_SHA" ]; then
            echo "::error::Could not fetch file SHA after 3 attempts"
            exit 1
          fi

          # Skip if content is unchanged
          if [ "$LOCAL_SHA" = "$FILE_SHA" ]; then
            echo "No changelog changes needed"
            exit 0
          fi

          echo "Content base64 length: ${#NEW_CONTENT} chars"

          # Try direct commit to main first
          DIRECT_ERR=$(mktemp)
          if gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts" \
            -X PUT \
            -f message="chore: sync changelog from GitHub releases" \
            -f content="$NEW_CONTENT" \
            -f sha="$FILE_SHA" \
            -f branch="main" > /dev/null 2>"$DIRECT_ERR"; then
            echo "Changelog committed directly to main"
            rm -f "$DIRECT_ERR"
            exit 0
          fi
          echo "::warning::Direct commit to main failed:"
          cat "$DIRECT_ERR"
          rm -f "$DIRECT_ERR"
          echo "Falling back to PR..."

          # Fallback: create a PR when direct push is blocked
          BRANCH="chore/sync-changelog-$(date +%s)"
          echo "Creating branch: $BRANCH"
          MAIN_SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha')
          echo "main HEAD: $MAIN_SHA"
          cleanup_branch() {
            echo "Cleaning up branch $BRANCH"
            gh api "repos/${{ github.repository }}/git/refs/heads/$BRANCH" -X DELETE 2>/dev/null || true
          }
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/heads/$BRANCH" \
            -f sha="$MAIN_SHA"
          # Re-fetch file SHA from current main in case it changed since initial fetch
          BRANCH_FILE_SHA=$(gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts?ref=$MAIN_SHA" \
            --jq '.sha' 2>/dev/null) || BRANCH_FILE_SHA="$FILE_SHA"
          if ! gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts" \
            -X PUT \
            -f message="chore: sync changelog from GitHub releases" \
            -f content="$NEW_CONTENT" \
            -f sha="$BRANCH_FILE_SHA" \
            -f branch="$BRANCH"; then
            cleanup_branch
            echo "::error::Failed to commit changelog to fallback branch"
            exit 1
          fi
          if ! PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base main \
            --title "chore: sync changelog from GitHub releases" \
            --body "Auto-generated changelog update after release publication." \
            --label chore 2>&1); then
            cleanup_branch
            echo "::error::Failed to create changelog PR"
            exit 1
          fi
          echo "Created changelog PR: $PR_URL"
