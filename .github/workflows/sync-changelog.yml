name: Sync Changelog

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes tsx@4.21.0 script/sync-changelog.ts

      - name: Create changelog PR
        id: cpr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: client/src/data/changelog.ts
          commit-message: "chore: sync changelog from GitHub releases"
          title: "chore: sync changelog from GitHub releases"
          body: "Auto-generated changelog update after release publication."
          branch: chore/sync-changelog
          delete-branch: true

      - name: Direct commit fallback
        if: steps.cpr.outcome == 'failure'
        run: |
          # Ensure we're on main — create-pull-request may have left us on
          # the chore/sync-changelog branch after a partial failure.
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/data/changelog.ts
          if git diff --cached --quiet; then
            echo "Changelog already up to date."
          else
            git commit -m "chore: sync changelog from GitHub releases"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Clean up orphaned branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Delete the chore/sync-changelog branch if no open PR references it.
          # Prevents orphaned branches from accumulating after partial failures.
          if ! gh pr list --repo "$REPO" --head chore/sync-changelog --state open --json number --jq '.[0].number' | grep -q .; then
            git push origin --delete chore/sync-changelog 2>/dev/null && echo "Deleted orphaned branch" || echo "Branch already gone"
          fi

      - name: Enable auto-merge
        if: steps.cpr.outcome == 'success' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        # Auto-merge requires "Allow auto-merge" enabled in repo settings.
        # If branch protection requires reviews, GITHUB_TOKEN cannot self-approve;
        # add github-actions[bot] to the bypass list or merge changelog PRs manually.
        run: |
          if ! merge_output=$(gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto 2>&1); then
            echo "::warning::Auto-merge failed: $merge_output"
          fi
