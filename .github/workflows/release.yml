name: Release Drafter

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release-draft:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@v6
        id: drafter
        with:
          publish: false
          config-name: release-drafter.yml
          # Autolabeling is handled by label-prs.yml on PR open/edit;
          # disable here to avoid pull_request_target warnings during draft updates
          disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-extension:
    needs: update-release-draft
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build and package extension
        run: NODE_ENV=production node scripts/build.js && node scripts/package.js
        working-directory: extension

      - name: Upload extension zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ needs.update-release-draft.outputs.tag_name }}"
          extension/fetchthechange-extension.zip
          --clobber

  publish-release:
    needs: [update-release-draft, upload-extension]
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release edit "${{ needs.update-release-draft.outputs.tag_name }}"
          --repo "${{ github.repository }}"
          --draft=false

  sync-changelog:
    needs: publish-release
    if: ${{ !cancelled() && needs.publish-release.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes tsx@4.21.0 script/sync-changelog.ts

      - name: Create changelog PR
        id: cpr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: client/src/data/changelog.ts
          commit-message: "chore: sync changelog from GitHub releases"
          title: "chore: sync changelog from GitHub releases"
          body: "Auto-generated changelog update after release publication."
          branch: chore/sync-changelog
          delete-branch: true

      - name: Direct commit fallback
        if: steps.cpr.outcome == 'failure'
        run: |
          # Ensure we're on main — create-pull-request may have left us on
          # the chore/sync-changelog branch after a partial failure.
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/data/changelog.ts
          if git diff --cached --quiet; then
            echo "Changelog already up to date."
          else
            git commit -m "chore: sync changelog from GitHub releases"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Enable auto-merge
        if: steps.cpr.outcome == 'success' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        # Auto-merge requires "Allow auto-merge" enabled in repo settings.
        # If branch protection requires reviews, GITHUB_TOKEN cannot self-approve;
        # add github-actions[bot] to the bypass list or merge changelog PRs manually.
        run: |
          if ! merge_output=$(gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --auto 2>&1); then
            echo "::warning::Auto-merge failed: $merge_output"
          fi
