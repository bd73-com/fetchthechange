name: Release Drafter

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release-draft:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@v6
        id: drafter
        with:
          publish: false
          config-name: release-drafter.yml
          disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-extension:
    needs: update-release-draft
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build and package extension
        run: NODE_ENV=production node scripts/build.js && node scripts/package.js
        working-directory: extension

      - name: Upload extension zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ needs.update-release-draft.outputs.tag_name }}"
          extension/fetchthechange-extension.zip
          --clobber

  publish-release:
    needs: [update-release-draft, upload-extension]
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release edit "${{ needs.update-release-draft.outputs.tag_name }}"
          --repo "${{ github.repository }}"
          --draft=false

  sync-changelog:
    needs: publish-release
    if: ${{ !cancelled() && needs.publish-release.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tsx
        run: npm install --no-save tsx@4.21.0

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx script/sync-changelog.ts

      - name: Create changelog PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync changelog from GitHub releases"
          title: "chore: sync changelog from GitHub releases"
          body: "Auto-generated changelog update after release publication."
          branch: chore/sync-changelog
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo ${{ github.repository }} --squash --auto 2>/dev/null \
            || echo "::warning::Auto-merge not available; PR requires manual merge"
