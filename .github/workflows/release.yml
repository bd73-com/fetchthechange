name: Release Drafter

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release-draft:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@v6
        id: drafter
        with:
          publish: false
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-extension:
    needs: update-release-draft
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build and package extension
        run: NODE_ENV=production node scripts/build.js && node scripts/package.js
        working-directory: extension

      - name: Upload extension zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ needs.update-release-draft.outputs.tag_name }}"
          extension/fetchthechange-extension.zip
          --clobber

  publish-release:
    needs: [update-release-draft, upload-extension]
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release edit "${{ needs.update-release-draft.outputs.tag_name }}"
          --repo "${{ github.repository }}"
          --draft=false

  sync-changelog:
    needs: publish-release
    if: ${{ !cancelled() && needs.publish-release.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-save tsx@4.21.0

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx script/sync-changelog.ts

      - name: Commit changelog update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL_SHA=$(git hash-object client/src/data/changelog.ts)
          NEW_CONTENT=$(base64 -w0 client/src/data/changelog.ts)

          # Fetch current file SHA from GitHub
          FILE_SHA=""
          for attempt in 1 2 3; do
            FILE_SHA=$(gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts" \
              --jq '.sha' 2>/dev/null) && [ -n "$FILE_SHA" ] && [ "$FILE_SHA" != "null" ] && break
            echo "Failed to fetch file SHA (attempt $attempt)"
            FILE_SHA=""
            sleep $((attempt * 2))
          done
          if [ -z "$FILE_SHA" ]; then
            echo "::error::Could not fetch file SHA after 3 attempts"
            exit 1
          fi

          # Skip if content is unchanged
          if [ "$LOCAL_SHA" = "$FILE_SHA" ]; then
            echo "No changelog changes needed"
            exit 0
          fi

          # Try direct commit to main first
          if gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts" \
            -X PUT \
            -f message="chore: sync changelog from GitHub releases" \
            -f content="$NEW_CONTENT" \
            -f sha="$FILE_SHA" \
            -f branch="main" > /dev/null 2>&1; then
            echo "Changelog committed directly to main"
            exit 0
          fi
          echo "Direct commit blocked (likely branch protection), falling back to PR"

          # Fallback: create a PR when direct push is blocked
          BRANCH="chore/sync-changelog-$(date +%s)"
          MAIN_SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/main" --jq '.object.sha')
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/heads/$BRANCH" \
            -f sha="$MAIN_SHA"
          gh api "repos/${{ github.repository }}/contents/client/src/data/changelog.ts" \
            -X PUT \
            -f message="chore: sync changelog from GitHub releases" \
            -f content="$NEW_CONTENT" \
            -f sha="$FILE_SHA" \
            -f branch="$BRANCH"
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base main \
            --title "chore: sync changelog from GitHub releases" \
            --body "Auto-generated changelog update after release publication." \
            --label chore
          echo "Created changelog PR from branch $BRANCH"
