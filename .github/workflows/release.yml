name: Release Drafter

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-release-draft:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@v6
        id: drafter
        with:
          publish: false
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-extension:
    needs: update-release-draft
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build and package extension
        run: NODE_ENV=production node scripts/build.js && node scripts/package.js
        working-directory: extension

      - name: Upload extension zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ needs.update-release-draft.outputs.tag_name }}"
          extension/fetchthechange-extension.zip
          --clobber

  publish-release:
    needs: [update-release-draft, upload-extension]
    if: needs.update-release-draft.outputs.tag_name
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release edit "${{ needs.update-release-draft.outputs.tag_name }}"
          --repo "${{ github.repository }}"
          --draft=false

  sync-changelog:
    needs: publish-release
    if: ${{ !cancelled() && needs.publish-release.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: sync-changelog
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-save tsx@4.21.0

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx script/sync-changelog.ts

      - name: Commit via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL_SHA=$(git hash-object client/src/data/changelog.ts)
          NEW_CONTENT=$(base64 -w0 client/src/data/changelog.ts)
          for attempt in 1 2 3; do
            FILE_META=$(gh api repos/${{ github.repository }}/contents/client/src/data/changelog.ts \
              --jq '{sha: .sha}' 2>/dev/null) || {
              echo "Failed to fetch file metadata (attempt $attempt)"
              sleep $((attempt * 2))
              continue
            }
            FILE_SHA=$(echo "$FILE_META" | jq -r '.sha')
            if [ -z "$FILE_SHA" ] || [ "$FILE_SHA" = "null" ]; then
              echo "Invalid file SHA (attempt $attempt)"
              sleep $((attempt * 2))
              continue
            fi
            # GitHub blob SHA is git hash-object of the file content
            if [ "$LOCAL_SHA" = "$FILE_SHA" ]; then
              echo "No changelog changes needed"
              exit 0
            fi
            ERROR_FILE=$(mktemp)
            gh api repos/${{ github.repository }}/contents/client/src/data/changelog.ts \
              -X PUT \
              -f message="chore: sync changelog from GitHub releases" \
              -f content="$NEW_CONTENT" \
              -f sha="$FILE_SHA" \
              -f branch="main" > /dev/null 2>"$ERROR_FILE" && {
              echo "Changelog committed successfully"
              rm -f "$ERROR_FILE"
              exit 0
            }
            echo "API commit failed (attempt $attempt):"
            cat "$ERROR_FILE"
            rm -f "$ERROR_FILE"
            sleep $((attempt * 2))
          done
          echo "Failed after 3 attempts" && exit 1
